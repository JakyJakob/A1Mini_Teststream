name: Build A1 Streamer EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --name "Bambu_A1_Streamer" a1_streamer.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Bambu_A1_Streamer_EXE
          path: dist/Bambu_A1_Streamer.exe
